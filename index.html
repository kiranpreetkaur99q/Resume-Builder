<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DREAM PORTFOLIO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Ballet:opsz@16..72&family=Flavors&family=Honk&family=Nosifer&family=Princess+Sofia&display=swap"
        rel="stylesheet">
    <style>
        .princess-sofia-regular {
            font-family: "Princess Sofia", cursive;
            font-weight: 90;
            /* font-size: 1; */
            font-weight: bold;
            letter-spacing: 0.3ch;

        }

        body {
            background-color: skyblue;
        }

        main {
            display: flex;
            width: auto;
            flex-direction: row;

        }

        .galaxy {
            flex: 1;
            background: navy;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            position: relative;
            transition: 0.3s;
        }

        .galaxy img {
            margin-top: 20px;
            width: 70%;
            max-width: 400px;
            height: 450px;

            border-radius: 10px;
            box-shadow: 0 0 15px white;
            transition: transform 0.3s;
        }

        img:hover {
            transform: scale(1.05);
        }

        .galaxy button {
            margin-top: 20px;
            font-size: 1.8rem;
            margin-bottom: 20px;
            background-color: skyblue;

        }

        /* Right side - Futuristic City theme */
        .city {
            flex: 1;
            background: green;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            position: relative;
            transition: 0.3s;
        }

        .city img {
            width: 70%;
            max-width: 400px;
            height: 450px;

            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0, 255, 150, 0.5);
            transition: transform 0.3s;
        }

        .city:hover img {
            transform: scale(1.05);
        }

        .city button {
            margin-top: 20px;
            margin-bottom: 20px;
            font-size: 1.8rem;
            background-color: skyblue;

        }

        @keyframes colorChange {
            0% {
                color: red;
            }

            25% {
                color: #000066;
            }

            50% {
                color: green;
            }

            75% {
                color: yellow;
            }

            100% {
                color: pink;
            }

        }

        h1 {
            text-align: center;
            animation: colorChange 3s linear infinite;
            text-decoration-line: underline;
            text-decoration-thickness: 4px;
        }
    </style>
</head>

<body>
    <h1 class="princess-sofia-regular">
        Select a template </h1>
    <main>

        <div class="galaxy">
            <img src="images/galaxy.png" alt="">
            <button>Galaxy</button>
            <!-- <h2> Galaxy theme</h2> -->
        </div>
        <div class="city">
            <img src="images/city.jpeg" alt="">
            <button>Futuristic City</button>
            <!-- <h2>Futuristic City Theme</h2> -->
        </div>
    </main>
</body>

</html>
