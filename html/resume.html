<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dream Resume</title>
    <link rel="stylesheet" href="../css/resume.css">
</head>

<body>
    <main class="resume-container">
        <header>
            <h1 id="name">Your Name</h1>
        </header>

        <div class="contact-info">
            <p id="address">Address not provided</p>
            <p id="email">Email not provided</p>
        </div>

        <section>
            <h2>Education</h2>
            <p id="education">Education details not provided</p>
        </section>

        <section>
            <h2>Skills</h2>
            <ul id="skills"></ul>
        </section>

        <section>
            <h2>Work Experience</h2>
            <ul id="experience"></ul>
        </section>

        <section>
            <h2>Future Goals</h2>
            <p id="goal">Goal not provided</p>
        </section>

        <button id="downloadPdf">Download </button>
    </main>
    <script src="../js/resume.js" defer></script>
</body>

</html>
